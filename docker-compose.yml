services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clube
      POSTGRES_PASSWORD: clube
      POSTGRES_DB: clube
    ports:
      - "5432:5432"
    volumes:
      - clube_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clube -d clube"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://clube:clube@db:5432/clube?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-change-me-em-producao}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-clube@exemplo.com}"
      GOOGLE_BOOKS_API_KEY: "${GOOGLE_BOOKS_API_KEY:-}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@clube.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      ADMIN_NAME: "${ADMIN_NAME:-Administrador}"
    ports:
      - "8080:8080"

volumes:
  clube_pgdata:
